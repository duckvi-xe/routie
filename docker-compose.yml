services:
  # ==========================================================================
  #  Routie Backend (FastAPI + Svelte frontend)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - USE_DB=${USE_DB:-false}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/routie.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ROUTE_PROVIDER=${ROUTE_PROVIDER:-mock}
      - VALHALLA_URL=${VALHALLA_URL:-http://valhalla:8002}
    volumes:
      - routie-data:/app/data
    restart: unless-stopped

  # ==========================================================================
  #  PostgreSQL (optional — activate with --profile prod)
  # ==========================================================================
  db:
    image: postgres:16-alpine
    profiles: ["prod"]
    environment:
      POSTGRES_DB: routie
      POSTGRES_USER: routie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routie}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  #  ngrok Tunnel (optional — activate with --profile tunnel)
  # ==========================================================================
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["tunnel"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command:
      - "http"
      - "--domain=${NGROK_DOMAIN:-}"
      - "backend:8000"
    depends_on:
      - backend
    restart: unless-stopped

  # ==========================================================================
  #  Valhalla Routing Engine (optional — activate with --profile valhalla)
  #  Image: ghcr.io/gis-ops/docker-valhalla/valhalla
  #  Docs: https://github.com/gis-ops/docker-valhalla
  # ==========================================================================
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    profiles: ["valhalla"]
    ports:
      - "8002:8002"
    volumes:
      - valhalla-tiles:/data/valhalla
      - ./data/osm/:/custom_files/
      - ./config/valhalla.json:/custom_files/valhalla.json:ro
    environment:
      - server_threads=${VALHALLA_THREADS:-2}
      - use_elevation=true
      - build_elevation=true
      - force_rebuild=${VALHALLA_REBUILD:-false}
      - use_tar=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  routie-data:
  pgdata:
  valhalla-tiles:
